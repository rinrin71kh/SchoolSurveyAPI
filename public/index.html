<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend Server</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0f172a;
        color: #e2e8f0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      .container {
        padding: 2rem;
      }

      h1 {
        font-size: 2.5rem;
        color: #10b981;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 1.1rem;
        color: #94a3b8;
      }

      code {
        background: #1e293b;
        padding: 0.2rem 0.4rem;
        border-radius: 0.3rem;
        font-family: monospace;
        color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>👋 Welcome to Your Backend Server</h1>
      <p>The API server is running on <code>http://localhost:5463</code></p>
      <p>Try calling endpoints like <code>/api/ping</code> or <code>/api/hello</code></p>
    </div>
  </body>
</html>
